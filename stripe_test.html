<!DOCTYPE html>
<html>
<head>
  <title>Stripe Test Checkout</title>
  <script src="https://js.stripe.com/v3/"></script>
</head>
<body style="font-family: sans-serif; padding: 50px; max-width: 400px; margin: auto;">
  
  <h2>Complete Test Payment</h2>
  <div id="payment-element"></div>
  <button id="submit" style="margin-top: 20px; padding: 10px 20px; background: blue; color: white; border: none; cursor: pointer;">Pay Now</button>
  <div id="error-message" style="color: red; margin-top: 20px;"></div>

  <script>
    const stripe = Stripe('pk_test_51TpOK5JZYQnbaY7AWgXHmrGlN57GxvE7lj4wVJNRuR8LcWhoEJ95fADSIuO36BsLd7ggnOcO8ilYXYROFZAkiEvM00Nw1g55Qp');
    const clientSecret = 'pi_3TwMX9JZYQnbaY7A0v2qA1MI_secret_9li6Wo2pYZZzO1MxrenEb29TN'; 

    const elements = stripe.elements({ clientSecret });
    const paymentElement = elements.create('payment');
    paymentElement.mount('#payment-element');

    document.getElementById('submit').addEventListener('click', async (e) => {
      e.preventDefault();
      const { error } = await stripe.confirmPayment({
        elements,
        confirmParams: { return_url: 'https://example.com' },
      });

      if (error) {
        document.getElementById('error-message').innerText = error.message;
      }
    });
  </script>
</body>
</html>
